<!DOCTYPE html>
<html>
<head>
  <title>Join Tapr</title>
  <style>
    body { font-family: Arial; text-align: center; padding: 30px; }
    input { padding: 12px; margin: 8px; width: 250px; font-size: 16px; }
    button { padding: 12px 20px; font-size: 16px; margin-top: 10px; cursor: pointer; }
    #status { margin-top: 20px; font-weight: bold; white-space: pre-wrap; }
  </style>
</head>
<body>

  <h2>Join Tapr</h2>

  <input id="phone" placeholder="Phone Number"><br>
  <input id="name" placeholder="Name"><br>
  <input id="email" placeholder="Email"><br>

  <button onclick="submitForm()">Join</button>

  <pre id="status"></pre>

  <script>
    const API = "https://tapr-backend-final-production.up.railway.app";

    const params = new URLSearchParams(window.location.search);
    const merchantKey = params.get("m");

    async function submitForm() {
      const phone = document.getElementById("phone").value.trim();
      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();

      const status = document.getElementById("status");

      status.innerText = "START...\n";

      try {
        status.innerText += "MERCHANT KEY: " + merchantKey + "\n\n";

        const walletRes = await fetch(`${API}/wallet/${phone}`, {
          headers: { "x-api-key": merchantKey }
        });

        const walletData = await walletRes.json();

        status.innerText += "WALLET RESPONSE:\n";
        status.innerText += JSON.stringify(walletData, null, 2) + "\n\n";

        const setupRes = await fetch(`${API}/customer/setup`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-api-key": merchantKey
          },
          body: JSON.stringify({ phone, name, email })
        });

        const setupData = await setupRes.json();

        status.innerText += "SETUP RESPONSE:\n";
        status.innerText += JSON.stringify(setupData, null, 2) + "\n\n";

        if (walletData.saveJWT) {
          status.innerText += "JWT FOUND ✅\n";

          window.location.href = `https://pay.google.com/gp/v/save/${walletData.saveJWT}`;
        } else {
          status.innerText += "JWT MISSING ❌\n";
        }

      } catch (err) {
        status.innerText += "ERROR:\n" + err.message;
      }
    }
  </script>

</body>
</html>
