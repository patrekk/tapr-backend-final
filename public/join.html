<!DOCTYPE html>
<html>
<head>
  <title>Join</title>
  <style>
    body {
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #f5f5f5;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 320px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 20px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="box">
  <h2 id="title">Join</h2>

  <input id="phone" placeholder="Phone Number">
  <input id="name" placeholder="Name">
  <input id="email" placeholder="Email">

  <button onclick="join()">Join</button>
</div>

<script>
const API = "https://tapr-backend-final-production.up.railway.app";

// get slug safely
function getSlug() {
  const parts = window.location.pathname.split("/");
  return parts[2];
}

const slug = getSlug();

console.log("Slug:", slug);

// 🔥 LOAD MERCHANT NAME
async function loadMerchant() {
  try {
    const res = await fetch(`${API}/merchant/${slug}`);
    const data = await res.json();

    console.log("Merchant response:", data);

    if (data && data.name) {
      document.getElementById("title").innerText = "Join " + data.name;
    } else {
      document.getElementById("title").innerText = "Join";
    }
  } catch (err) {
    console.log("Error loading merchant:", err);
    document.getElementById("title").innerText = "Join";
  }
}

loadMerchant();

// keep original working join logic
function join() {
  const phone = document.getElementById("phone").value;

  if (!phone) {
    alert("Enter phone number");
    return;
  }

  window.location.href = `${API}/wallet/${slug}/${phone}`;
}
</script>

</body>
</html>
