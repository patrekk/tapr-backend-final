<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <title>Dashboard</title>
  <style>

    :root {
  --primary: #2B396D;
  --bg: #F7F8FA;
  --card: #FFFFFF;
  --text: #0B0B0B;
  --muted: #777;
  --border: #E5E7EB;
}

    body {
  font-family: 'Inter', sans-serif;
  margin: 0;
  padding: 24px;
  background: var(--bg);
  color: var(--text);
}

    h2 {
      margin-bottom: 10px;
    }

    .cards {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
    }

    .card {
  flex: 1;
  background: var(--card);
  padding: 20px;
  border-radius: 16px;
  border: 1px solid var(--border);
  text-align: center;
}

.card h3 {
  font-size: 28px;
  margin: 0;
  color: var(--primary);
}

.card p {
  font-size: 13px;
  color: var(--muted);
}

    .section {
  background: var(--card);
  padding: 20px;
  border-radius: 16px;
  border: 1px solid var(--border);
  margin-bottom: 20px;
}

    table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

th {
  text-align: left;
  padding: 10px;
  font-size: 13px;
  color: var(--muted);
  border-bottom: 1px solid var(--border);
}

td {
  padding: 12px 10px;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
}

tr:hover {
  background: #f9fafb;
}

button {
  padding: 12px 16px;
  background: var(--primary);
  color: white;
  border: none;
  border-radius: 12px;
  font-weight: 600;
  cursor: pointer;
}

button.secondary {
  background: white;
  color: var(--text);
  border: 1px solid var(--border);
}

button:hover {
  filter: brightness(0.9);
}

    #qrBox {
      text-align: center;
      margin-top: 10px;
    }

    #qrBox img {
      width: 200px;
    }

    #link {
      font-size: 12px;
      word-break: break-all;
    }
  </style>
</head>
<body>

<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
  <h2 style="margin:0;">Dashboard</h2>
  <button onclick="goScanner()">Open Scanner</button>
</div>

  <div class="section">
    <h3>Your QR</h3>
    <button onclick="generateQR()" class="secondary">Generate QR</button>

    <div id="qrBox"></div>
    <p id="link"></p>
  </div>

  <div class="cards">
    <div class="card">
      <h3 id="customers">0</h3>
      <p>Customers</p>
    </div>
    <div class="card">
      <h3 id="scans">0</h3>
      <p>Visits</p>
    </div>
    <div class="card">
      <h3 id="avg">0</h3>
      <p>Avg Visits</p>
    </div>
  </div>

  <div class="section">
    <h3>Customers</h3>
    <table>
      <thead>
        <tr>
          <th>Phone</th>
          <th>Name</th>
          <th>Loop</th>
          <th>Total</th>
        </tr>
      </thead>
      <tbody id="customersTable"></tbody>
    </table>
  </div>

  <div class="section">
    <h3>Recent Scans</h3>
    <table>
      <thead>
        <tr>
          <th>Phone</th>
          <th>Visit</th>
          <th>Discount</th>
          <th>Time</th>
        </tr>
      </thead>
      <tbody id="logsTable"></tbody>
    </table>
  </div>

  <script>
    const API = "https://tapr-backend-final-production.up.railway.app";

    function getToken() {
      return localStorage.getItem("token");
    }

    if (!getToken()) {
      window.location.href = "/login.html";
    }

    function goScanner() {
      window.location.href = "/scanner.html";
    }

    async function loadStats() {
      const res = await fetch(`${API}/merchant/stats`, {
        headers: { authorization: getToken() }
      });
      const data = await res.json();

      document.getElementById("customers").innerText = data.total_customers ?? 0;
      document.getElementById("scans").innerText = data.total_visits ?? 0;
      document.getElementById("avg").innerText = data.avg_visits ?? 0;
    }

    async function loadCustomers() {
      const res = await fetch(`${API}/merchant/customers`, {
        headers: { authorization: getToken() }
      });
      const data = await res.json();

      const table = document.getElementById("customersTable");
      table.innerHTML = "";

      if (!Array.isArray(data)) {
  console.log("Customers error:", data);
  return;
}



      data.forEach(c => {
        table.innerHTML += `
          <tr>
            <td>${c.phone}</td>
            <td>${c.name || "-"}</td>
            <td>${c.visit_count}</td>
            <td>${c.total_visits || 0}</td>
          </tr>
        `;
      });
    }

    async function loadLogs() {
  const res = await fetch(`${API}/merchant/scan-logs`, {
    headers: { authorization: getToken() }
  });

  const data = await res.json();

  const table = document.getElementById("logsTable");
  table.innerHTML = "";

  if (!Array.isArray(data)) {
    console.log("Logs error:", data);
    return;
  }

  data.forEach(l => {
  let visit = "-";
  let discount = "-";

  try {
    const parsed = JSON.parse(l.result);
    visit = parsed.visit ?? "-";
    discount = parsed.discount ?? "-";
  } catch {
    // fallback for old string format
    const match = l.result.match(/Visit (\d+) → ₱(\d+)/);
    if (match) {
      visit = match[1];
      discount = match[2];
    }
  }

  table.innerHTML += `
    <tr>
      <td>${l.phone}</td>
      <td>${visit}</td>
      <td>₱${discount}</td>
      <td>${new Date(l.scanned_at).toLocaleTimeString()}</td>
    </tr>
  `;
});
}

    async function generateQR() {
      const res = await fetch(`${API}/merchant/me`, {
        headers: { authorization: getToken() }
      });

      const data = await res.json();

      const url = `${API}/join/${data.slug}`;

      document.getElementById("link").innerText = url;

      document.getElementById("qrBox").innerHTML =
        `<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${url}" />`;
    }

async function applyBranding() {
  const res = await fetch(`${API}/merchant/me`, {
    headers: { authorization: getToken() }
  });

  const data = await res.json();

  if (data.hex_color) {
    document.documentElement.style
      .setProperty('--primary', data.hex_color);
  }
}

applyBranding();    

    loadStats();
    loadCustomers();
    loadLogs();
  </script>

</body>
</html>
