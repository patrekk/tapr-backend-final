<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
</head>
<body>

<h2>Dashboard</h2>

<p id="status"></p>
<p id="link"></p>

<button onclick="generateQR()">Generate QR</button>

<script>
const API = "https://tapr-backend-final-production.up.railway.app";

function getToken() {
  return localStorage.getItem("token");
}

// 🔥 ENSURE TOKEN EXISTS FIRST
const token = getToken();

if (!token) {
  window.location.href = "/login.html";
}

// 🔥 LOAD MERCHANT
async function loadMerchant() {
  const res = await fetch(`${API}/merchant/me`, {
    headers: { authorization: token }
  });

  const data = await res.json();

  if (!data.slug) {
    localStorage.clear();
    window.location.href = "/login.html";
    return;
  }

  document.getElementById("status").innerText = "Logged in as: " + data.name;
  window.slug = data.slug;
}

function generateQR() {
  const url = `${window.location.origin}/join/${window.slug}`;
  document.getElementById("link").innerText = url;
}

loadMerchant();
</script>

</body>
</html>
