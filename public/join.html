<!DOCTYPE html>
<html>
<head>
  <title>Join</title>
  <style>
    body {
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #f5f5f5;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 320px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 20px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="box">
  <h2 id="title">Join</h2>

  <input id="phone" placeholder="Phone Number">
  <input id="name" placeholder="Name">
  <input id="email" placeholder="Email">

  <button onclick="join()">Join</button>
</div>

<script>
function getSlug() {
  return window.location.pathname.split("/")[2];
}

const slug = getSlug();

// 🔥 HARD MAP (SAFE — NO API CALL)
const merchantNames = {
  feralstudios: "Feral Cafe"
};

if (merchantNames[slug]) {
  document.getElementById("title").innerText =
    "Join " + merchantNames[slug];
}

function join() {
  const phone = document.getElementById("phone").value;
  window.location.href = `/wallet/${slug}/${phone}`;
}
</script>

</body>
</html>
