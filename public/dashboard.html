<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
</head>
<body>

<h2>Dashboard</h2>

<p id="status"></p>
<p id="link"></p>

<button onclick="generateQR()">Generate QR</button>

<script>
const API = "https://tapr-backend-final-production.up.railway.app";

function getToken() {
  return localStorage.getItem("token");
}

async function loadMerchant() {
  const res = await fetch(`${API}/merchant/me`, {
    headers: { authorization: getToken() }
  });

  const data = await res.json();

  if (!data.slug) {
    document.getElementById("status").innerText = "Session invalid. Login again.";
    return;
  }

  document.getElementById("status").innerText = "Logged in as: " + data.name;

  window.slug = data.slug;
}

function generateQR() {
  if (!window.slug) {
    alert("Merchant not loaded");
    return;
  }

  const url = `${window.location.origin}/join/${window.slug}`;
  document.getElementById("link").innerText = url;
}

loadMerchant();
</script>

</body>
</html>
