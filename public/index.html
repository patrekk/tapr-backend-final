<!DOCTYPE html>
<html>
<head>
  <title>Tapr Scanner</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">

  <style>
    body {
      text-align: center;
      font-family: Arial;
      transition: background 0.2s;
    }

    #result {
      font-size: 50px;
      margin-top: 20px;
      font-weight: bold;
    }

    #sub {
      font-size: 20px;
      margin-top: 10px;
    }

    #status {
      font-size: 18px;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <h2>Tapr Scanner</h2>

  <button onclick="startScanner()" id="startBtn">
    Start Scanner
  </button>

  <div id="reader" style="width:300px; margin:auto; margin-top:20px;"></div>

  <div id="result"></div>
  <div id="sub"></div>
  <div id="status">Tap to start</div>

  <audio id="beep">
    <source src="https://www.soundjay.com/buttons/beep-01a.mp3" type="audio/mpeg">
  </audio>

  <script>
    let html5QrCode;
    let scanning = false;

    function getRewardText(visit) {
      switch (visit) {
        case 1:
        case 2:
          return "₱10";
        case 3:
          return "₱20";
        case 4:
          return "₱50 next visit";
        case 5:
          return "Reward unlocked";
      }
    }

    async function scan(token) {
      try {
        const res = await fetch('/scan', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': 'secret123'
          },
          body: JSON.stringify({ token })
        });

        const data = await res.json();

        if (data.error) {
          showError(data.error);
          return;
        }

        showSuccess(data);

      } catch {
        showError("Network error");
      }
    }

    function showSuccess(data) {
      document.getElementById('beep').play();

      document.body.style.background = "#00c853";

      // 🔥 MAIN MESSAGE
      if (data.applied_discount > 0) {
        document.getElementById('result').innerText =
          `₱${data.applied_discount} OFF`;
      } else {
        document.getElementById('result').innerText =
          `VISIT RECORDED`;
      }

      // 🔥 SECONDARY MESSAGE
      document.getElementById('sub').innerText =
        `Earned: ${getRewardText(data.visit_count)}`;

      // 🔥 STATUS LINE
      document.getElementById('status').innerText =
        `Visit #${data.visit_count}`;

      resetScanner();
    }

    function showError(msg) {
      document.body.style.background = "#d50000";

      document.getElementById('result').innerText = "ERROR";
      document.getElementById('sub').innerText = "";
      document.getElementById('status').innerText = msg;

      resetScanner();
    }

    function resetScanner() {
      setTimeout(() => {
        document.body.style.background = "white";
        document.getElementById('result').innerText = "";
        document.getElementById('sub').innerText = "";
        document.getElementById('status').innerText = "Ready";

        html5QrCode.start(
          { facingMode: "environment" },
          { fps: 10, qrbox: 250 },
          onScanSuccess
        ).then(() => {
          scanning = true;
        });
      }, 1500);
    }

    async function onScanSuccess(decodedText) {
      if (!scanning) return;

      scanning = false;

      await html5QrCode.stop();

      scan(decodedText);
    }

    function startScanner() {
      document.getElementById('startBtn').style.display = "none";

      html5QrCode = new Html5Qrcode("reader");

      html5QrCode.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: 250 },
        onScanSuccess
      ).then(() => {
        scanning = true;
        document.getElementById('status').innerText = "Scanning...";
      });
    }
  </script>

</body>
</html>
