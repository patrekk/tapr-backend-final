<!DOCTYPE html>
<html>
<head>
  <title>Join Tapr</title>
  <style>
    body {
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #f5f5f5;
    }

    .container {
      text-align: center;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
      width: 320px;
    }

    input {
      padding: 12px;
      margin: 8px 0;
      width: 100%;
      font-size: 16px;
    }

    button {
      padding: 12px;
      width: 100%;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }

    #status {
      margin-top: 15px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Join Tapr</h2>

    <input id="phone" placeholder="Phone Number">
    <input id="name" placeholder="Name">
    <input id="email" placeholder="Email">

    <button onclick="submitForm()">Join</button>

    <p id="status"></p>
  </div>

  <script>
    const API = "https://tapr-backend-final-production.up.railway.app";

    // 🔥 SAFE SLUG EXTRACTION
    function getSlug() {
      const path = window.location.pathname;

      // /join/feralstudios
      if (path.startsWith("/join/")) {
        return path.split("/")[2];
      }

      // fallback: ?slug=
      const params = new URLSearchParams(window.location.search);
      return params.get("slug");
    }

    const slug = getSlug();

    async function submitForm() {
      const phone = document.getElementById("phone").value.trim();
      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const status = document.getElementById("status");

      if (!slug) {
        status.innerText = "Invalid link";
        return;
      }

      if (!phone || !name || !email) {
        status.innerText = "Fill all fields";
        return;
      }

      status.innerText = "Processing...";

      try {
        const walletRes = await fetch(`${API}/wallet/${slug}/${phone}`);
        const walletData = await walletRes.json();

        if (!walletData.saveJWT) {
          status.innerText = "Wallet error";
          return;
        }

        await fetch(`${API}/customer/setup/${slug}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ phone, name, email })
        });

        status.innerText = "Opening wallet...";

        window.location.href =
          `https://pay.google.com/gp/v/save/${walletData.saveJWT}`;

      } catch (err) {
        status.innerText = "Something went wrong";
      }
    }
  </script>

</body>
</html>
