<!DOCTYPE html>
<html>
<head>
  <title>Join</title>
</head>
<body>

<h2 id="title">Join</h2>

<input id="phone" placeholder="Phone"><br><br>
<input id="name" placeholder="Name"><br><br>
<input id="email" placeholder="Email"><br><br>

<button onclick="join()">Join</button>

<script>
const API = "https://tapr-backend-final-production.up.railway.app";

function getSlug() {
  return window.location.pathname.split("/")[2];
}

const slug = getSlug();

// 🔥 ONLY CHANGE
async function loadMerchant() {
  try {
    const res = await fetch(`${API}/merchant/${slug}`);
    const data = await res.json();

    if (data.name) {
      document.getElementById("title").innerText = "Join " + data.name;
    }
  } catch {}
}

loadMerchant();

// original flow
async function join() {
  const phone = document.getElementById("phone").value;

  window.location.href = `${API}/wallet/${slug}/${phone}`;
}
</script>

</body>
</html>
