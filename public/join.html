<!DOCTYPE html>
<html>
<head>
  <title>Join Tapr</title>
  <style>
    body { font-family: Arial; text-align: center; padding: 30px; }
    input { padding: 12px; margin: 8px; width: 250px; font-size: 16px; }
    button { padding: 12px 20px; font-size: 16px; margin-top: 10px; cursor: pointer; }
    #status { margin-top: 20px; font-weight: bold; }
    #walletBtn { display: none; margin-top: 20px; background: black; color: white; }
  </style>
</head>
<body>

  <h2>Join Tapr</h2>

  <input id="phone" placeholder="Phone Number"><br>
  <input id="name" placeholder="Name"><br>
  <input id="email" placeholder="Email"><br>

  <button onclick="submitForm()">Join</button>

  <p id="status"></p>

  <button id="walletBtn" onclick="openWallet()">Add to Wallet</button>

  <script>
    const API = "https://tapr-backend-final-production.up.railway.app";

    let walletToken = null;

    // 🔥 GET MERCHANT FROM URL
    const params = new URLSearchParams(window.location.search);
    const merchantKey = params.get("m");

    if (!merchantKey) {
      document.body.innerHTML = "<h3>Invalid merchant link</h3>";
    }

    async function submitForm() {
      const phone = document.getElementById("phone").value.trim();
      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();

      const status = document.getElementById("status");
      const walletBtn = document.getElementById("walletBtn");

      if (!phone || !name || !email) {
        status.innerText = "Fill all fields";
        return;
      }

      status.innerText = "Creating account...";

      try {
        // 🔥 CREATE / GET WALLET FOR THIS MERCHANT
        const walletRes = await fetch(`${API}/wallet/${phone}`, {
          headers: {
            "x-api-key": merchantKey
          }
        });

        const walletData = await walletRes.json();

        // 🔥 SAVE DETAILS (WITH MERCHANT CONTEXT)
        await fetch(`${API}/customer/setup`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-api-key": merchantKey
          },
          body: JSON.stringify({ phone, name, email })
        });

        walletToken = walletData.qrToken;

        status.innerText = "Account created!";
        walletBtn.style.display = "inline-block";

      } catch (err) {
        status.innerText = "Something went wrong";
      }
    }

    function openWallet() {
      if (!walletToken) return;
      const url = `https://pay.google.com/gp/v/save/${walletToken}`;
      window.location.href = url;
    }
  </script>

</body>
</html>
