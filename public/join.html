<!DOCTYPE html>
<html>
<head>
  <title>Join Tapr</title>
  <style>
    body { font-family: Arial; text-align: center; padding: 30px; }
    input { padding: 12px; margin: 8px; width: 250px; font-size: 16px; }
    button { padding: 12px 20px; font-size: 16px; margin-top: 10px; cursor: pointer; }
    #status { margin-top: 20px; font-weight: bold; }
    #walletBtn { display: none; margin-top: 20px; background: black; color: white; }
  </style>
</head>
<body>

  <h2>Join Tapr</h2>

  <input id="phone" placeholder="Phone Number"><br>
  <input id="name" placeholder="Name"><br>
  <input id="email" placeholder="Email"><br>

  <button onclick="submitForm()">Join</button>

  <p id="status"></p>

  <button id="walletBtn">Add to Wallet</button>

  <script>
    const API = "https://tapr-backend-final-production.up.railway.app";

    let saveJWT = null;

    const params = new URLSearchParams(window.location.search);
    const merchantKey = params.get("m");

    async function submitForm() {
      const phone = document.getElementById("phone").value.trim();
      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();

      const status = document.getElementById("status");
      const walletBtn = document.getElementById("walletBtn");

      status.innerText = "Processing...";
      walletBtn.style.display = "none";

      try {
        const walletRes = await fetch(`${API}/wallet/${phone}`, {
          headers: { "x-api-key": merchantKey }
        });

        const walletData = await walletRes.json();

        saveJWT = walletData.saveJWT;

        if (!saveJWT) {
          status.innerText = "Wallet error";
          return;
        }

        status.innerText = "Ready to add to wallet";

        walletBtn.style.display = "inline-block";

        // 🔥 DIRECT NAVIGATION (NO POPUP)
        walletBtn.onclick = function () {
          window.location.href = `https://pay.google.com/gp/v/save/${saveJWT}`;
        };

      } catch (err) {
        status.innerText = "Something went wrong";
      }
    }
  </script>

</body>
</html>
