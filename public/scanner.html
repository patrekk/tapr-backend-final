<!DOCTYPE html>
<html>
<head>
  <title>Tapr Scanner</title>
  <style>
    body { font-family: Arial; text-align: center; padding: 20px; }

    #video { width: 300px; border-radius: 12px; margin-top: 20px; }

    #status { margin-top: 20px; font-size: 18px; font-weight: bold; }

    button {
      padding: 12px 20px;
      font-size: 16px;
      margin-top: 20px;
      cursor: pointer;
    }

    #form {
      display: none;
      margin-top: 20px;
    }

    input {
      padding: 10px;
      margin: 5px;
      width: 200px;
    }
  </style>
</head>
<body>

  <h2>Tapr Scanner</h2>

  <button onclick="startScanner()">Start Scanner</button>

  <br>

  <video id="video" autoplay playsinline></video>

  <p id="status">Idle</p>

  <!-- 🔥 CUSTOMER FORM -->
  <div id="form">
    <h3>Enter Details</h3>
    <input id="name" placeholder="Name"><br>
    <input id="email" placeholder="Email"><br>
    <button onclick="submitDetails()">Submit</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jsqr"></script>

  <script>
    const API = "https://tapr-backend-final-production.up.railway.app";

    const video = document.getElementById("video");
    const status = document.getElementById("status");
    const form = document.getElementById("form");

    let scanning = false;
    let currentPhone = null;

    async function startScanner() {
      status.innerText = "Starting camera...";

      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment" }
      });

      video.srcObject = stream;

      video.onloadedmetadata = () => {
        video.play();
        scanning = true;
        status.innerText = "Ready to scan";
        requestAnimationFrame(scanFrame);
      };
    }

    function scanFrame() {
      if (!scanning) return;

      if (video.videoWidth === 0) {
        requestAnimationFrame(scanFrame);
        return;
      }

      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");

      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;

      ctx.drawImage(video, 0, 0);

      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = jsQR(imageData.data, canvas.width, canvas.height);

      if (code) {
        handleScan(code.data.trim());
        return;
      }

      requestAnimationFrame(scanFrame);
    }

    async function handleScan(token) {
      scanning = false;
      status.innerText = "Processing...";

      try {
        const res = await fetch(`${API}/scan`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-api-key": "test_merchant_key_123"
          },
          body: JSON.stringify({ token })
        });

        const data = await res.json();

        if (data.error === "missing_details") {
          status.innerText = "Enter customer details";
          form.style.display = "block";

          // 🔥 decode phone from JWT
          const payload = JSON.parse(atob(token.split('.')[1]));
          currentPhone = payload.phone;

          return;
        }

        if (data.error) {
          status.innerText = data.error;
        } else {
          status.innerText = `Visit: ${data.visit} | Reward: ₱${data.applied_discount}`;
        }

      } catch (err) {
        status.innerText = "Scan failed";
      }

      resetScanner();
    }

    async function submitDetails() {
      const name = document.getElementById("name").value;
      const email = document.getElementById("email").value;

      status.innerText = "Saving...";

      await fetch(`${API}/customer/setup`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": "test_merchant_key_123"
        },
        body: JSON.stringify({
          phone: currentPhone,
          name,
          email
        })
      });

      form.style.display = "none";
      status.innerText = "Saved. Scan again.";

      resetScanner();
    }

    function resetScanner() {
      setTimeout(() => {
        scanning = true;
        status.innerText = "Ready";
        requestAnimationFrame(scanFrame);
      }, 2000);
    }
  </script>

</body>
</html>
