<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <style>
    body {
      font-family: Arial;
      margin: 20px;
      background: #f5f5f5;
    }

    h2 {
      margin-bottom: 10px;
    }

    .cards {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .card {
      flex: 1;
      background: black;
      color: white;
      padding: 20px;
      text-align: center;
      border-radius: 10px;
    }

    .section {
      background: #eee;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      text-align: left;
      padding: 8px;
      background: #ddd;
    }

    td {
      padding: 8px;
      border-bottom: 1px solid #ccc;
    }

    button {
      padding: 10px;
      margin-bottom: 10px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }

    #qrBox {
      text-align: center;
      margin-top: 10px;
    }

    #qrBox img {
      width: 200px;
    }

    #link {
      font-size: 12px;
      word-break: break-all;
    }
  </style>
</head>
<body>

  <h2>Dashboard</h2>

  <button onclick="goScanner()">Open Scanner</button>

  <div class="section">
    <h3>Your QR</h3>
    <button onclick="generateQR()">Generate QR</button>

    <div id="qrBox"></div>
    <p id="link"></p>
  </div>

  <div class="cards">
    <div class="card">
      <h3 id="customers">0</h3>
      <p>Customers</p>
    </div>
    <div class="card">
      <h3 id="scans">0</h3>
      <p>Total Scans</p>
    </div>
    <div class="card">
      <h3 id="today">0</h3>
      <p>Today</p>
    </div>
  </div>

  <div class="section">
    <h3>Customers</h3>
    <table>
      <thead>
        <tr>
          <th>Phone</th>
          <th>Name</th>
          <th>Visits</th>
        </tr>
      </thead>
      <tbody id="customersTable"></tbody>
    </table>
  </div>

  <div class="section">
    <h3>Recent Scans</h3>
    <table>
      <thead>
        <tr>
          <th>Phone</th>
          <th>Result</th>
        </tr>
      </thead>
      <tbody id="logsTable"></tbody>
    </table>
  </div>

  <script>
    const API = "https://tapr-backend-final-production.up.railway.app";

    function getToken() {
      return localStorage.getItem("token");
    }

    if (!getToken()) {
      window.location.href = "/login.html";
    }

    function goScanner() {
      window.location.href = "/scanner.html";
    }

    async function loadStats() {
      const res = await fetch(`${API}/merchant/stats`, {
        headers: { authorization: getToken() }
      });
      const data = await res.json();

      document.getElementById("customers").innerText = data.total_customers;
      document.getElementById("scans").innerText = data.total_scans;
      document.getElementById("today").innerText = data.today_scans;
    }

    async function loadCustomers() {
      const res = await fetch(`${API}/merchant/customers`, {
        headers: { authorization: getToken() }
      });
      const data = await res.json();

      const table = document.getElementById("customersTable");
      table.innerHTML = "";

      if (!Array.isArray(data)) {
  console.log("Customers error:", data);
  return;
}



      data.forEach(c => {
        table.innerHTML += `
          <tr>
            <td>${c.phone}</td>
            <td>${c.name || "-"}</td>
            <td>${c.visit_count}</td>
          </tr>
        `;
      });
    }

    async function loadLogs() {
      const res = await fetch(`${API}/merchant/scan-logs`, {
        headers: { authorization: getToken() }
      });
      const data = await res.json();

      const table = document.getElementById("logsTable");
      table.innerHTML = "";

      if (!Array.isArray(data)) {

  console.log("Logs error:", data);

  return;

}

      data.forEach(l => {
        table.innerHTML += `
          <tr>
            <td>${l.phone}</td>
            <td>${l.result}</td>
          </tr>
        `;
      });
    }

    async function generateQR() {
      const res = await fetch(`${API}/merchant/me`, {
        headers: { authorization: getToken() }
      });

      const data = await res.json();

      const url = `${window.location.origin}/join/${data.slug}`;

      document.getElementById("link").innerText = url;

      document.getElementById("qrBox").innerHTML =
        `<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${url}" />`;
    }

    loadStats();
    loadCustomers();
    loadLogs();
  </script>

</body>
</html>
