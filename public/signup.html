<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Start with Tapr</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #2B396D;
      --bg: #F7F8FA;
      --text: #0B0B0B;
      --muted: #666;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .box {
      background: white;
      padding: 32px;
      border-radius: 18px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    h1 {
      margin-bottom: 8px;
    }

    .sub {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .value {
      font-size: 13px;
      background: #eef2ff;
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 16px;
      margin-top: 10px;
      border-radius: 12px;
      border: 1px solid #ddd;
      font-size: 15px;
      box-sizing: border-box;
    }

    input:focus {
      border-color: var(--primary);
      outline: none;
      box-shadow: 0 0 0 2px rgba(43, 57, 109, 0.2);
    }

    button {
      width: 100%;
      padding: 16px;
      margin-top: 20px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 14px;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
    }

    button:hover {
      filter: brightness(0.9);
    }

    button:disabled {
      background: #aaa;
    }

    .trust {
      text-align: center;
      font-size: 12px;
      color: #888;
      margin-top: 14px;
    }

    #status {
      margin-top: 10px;
      font-size: 13px;
      color: red;
      text-align: center;
    }

    .logo {
      height: 28px;
      width: auto;
      display: block;
    }
  </style>
</head>

<body>

  <div class="box">
    <img src="/images/logo.png" class="logo">

    <h1>Start getting repeat customers</h1>
    <p class="sub">Set up your loyalty system in under 2 minutes</p>

    <div class="value">
      ✔ Turn 1-time visitors into regulars
      <br>
      ✔ No app required
      <br>
      ✔ Free early access
    </div>

    <input id="name" placeholder="Business Name">
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="signup(event)" id="signupBtn">
      Create Account
    </button>

    <p id="status"></p>

    <p class="trust">No setup fees • No contracts</p>

  </div>

  <script>
    const API = "https://tapr-backend-final-production.up.railway.app";

    async function signup(event) {
      const btn = document.getElementById("signupBtn");
      btn.innerText = "Creating...";
      btn.disabled = true;

      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      // 🔒 BASIC VALIDATION
      if (!name || !email || !password) {
        showError("Fill all fields");
        resetBtn();
        return;
      }

      if (!/^\S+@\S+\.\S+$/.test(email)) {
        showError("Enter a valid email");
        resetBtn();
        return;
      }

      if (password.length < 6) {
        showError("Password must be at least 6 characters");
        resetBtn();
        return;
      }

      try {
        const res = await fetch(`${API}/merchant/signup`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ name, email, password })
        });

        const data = await res.json();

        if (data.error) {
          showError(data.error);
          resetBtn();
          return;
        }

        // 🔥 SUCCESS FLOW
        window.location.href = "/login";

      } catch {
        showError("Something went wrong");
        resetBtn();
      }

      function showError(msg) {
        document.getElementById("status").innerText = msg;
      }

      function resetBtn() {
        btn.innerText = "Create Account";
        btn.disabled = false;
      }
    }
  </script>

</body>

</html>
