<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
    }

    h2 {
      margin-bottom: 10px;
    }

    .card {
      background: white;
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 10px;
    }

    .stats {
      display: flex;
      gap: 20px;
    }

    .stat {
      flex: 1;
      background: black;
      color: white;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      font-size: 18px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
      text-align: left;
    }

    th {
      background: #eee;
    }
  </style>
</head>
<body>

  <h2>Dashboard</h2>

  <div class="card stats">
    <div class="stat" id="totalCustomers">0<br>Customers</div>
    <div class="stat" id="totalScans">0<br>Total Scans</div>
    <div class="stat" id="todayScans">0<br>Today</div>
  </div>

  <div class="card">
    <h3>Customers</h3>
    <table>
      <thead>
        <tr>
          <th>Phone</th>
          <th>Name</th>
          <th>Visits</th>
        </tr>
      </thead>
      <tbody id="customersBody"></tbody>
    </table>
  </div>

  <div class="card">
    <h3>Recent Scans</h3>
    <table>
      <thead>
        <tr>
          <th>Phone</th>
          <th>Time</th>
          <th>Result</th>
        </tr>
      </thead>
      <tbody id="logsBody"></tbody>
    </table>
  </div>

  <script>
    const API = "https://tapr-backend-final-production.up.railway.app";
    const token = localStorage.getItem("token");

    if (!token) {
      window.location.href = "/login.html";
    }

    async function loadStats() {
      try {
        const res = await fetch(`${API}/merchant/stats`, {
          headers: { authorization: token }
        });

        const data = await res.json();
        console.log("STATS:", data);

        document.getElementById("totalCustomers").innerHTML =
          (data.total_customers || 0) + "<br>Customers";

        document.getElementById("totalScans").innerHTML =
          (data.total_scans || 0) + "<br>Total Scans";

        document.getElementById("todayScans").innerHTML =
          (data.today_scans || 0) + "<br>Today";

      } catch (err) {
        console.error("Stats error:", err);
      }
    }

    async function loadCustomers() {
      try {
        const res = await fetch(`${API}/merchant/customers`, {
          headers: { authorization: token }
        });

        const data = await res.json();
        console.log("CUSTOMERS:", data);

        const tbody = document.getElementById("customersBody");
        tbody.innerHTML = "";

        data.forEach(c => {
          const row = `
            <tr>
              <td>${c.phone}</td>
              <td>${c.name || "-"}</td>
              <td>${c.visit_count || 0}</td>
            </tr>
          `;
          tbody.innerHTML += row;
        });

      } catch (err) {
        console.error("Customers error:", err);
      }
    }

    async function loadLogs() {
      try {
        const res = await fetch(`${API}/merchant/scan-logs`, {
          headers: { authorization: token }
        });

        const data = await res.json();
        console.log("LOGS:", data);

        const tbody = document.getElementById("logsBody");
        tbody.innerHTML = "";

        data.forEach(l => {
          const time = new Date(l.scanned_at).toLocaleString();

          const row = `
            <tr>
              <td>${l.phone}</td>
              <td>${time}</td>
              <td>${l.result || "-"}</td>
            </tr>
          `;
          tbody.innerHTML += row;
        });

      } catch (err) {
        console.error("Logs error:", err);
      }
    }

    loadStats();
    loadCustomers();
    loadLogs();
  </script>

</body>
</html>
