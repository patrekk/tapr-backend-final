<!DOCTYPE html>
<html>
<head>
  <title>Tapr Scanner</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 20px;
    }

    #video {
      width: 300px;
      border-radius: 12px;
      margin-top: 20px;
    }

    #status {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
    }

    button {
      padding: 12px 20px;
      font-size: 16px;
      margin-top: 20px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h2>Tapr Scanner</h2>

  <button onclick="startScanner()">Start Scanner</button>

  <br>

  <video id="video" autoplay playsinline></video>

  <p id="status">Idle</p>

  <script src="https://cdn.jsdelivr.net/npm/jsqr"></script>

  <script>
    const API = "https://tapr-backend-final-production.up.railway.app";

    const video = document.getElementById("video");
    const status = document.getElementById("status");

    let scanning = false;

    async function startScanner() {
      status.innerText = "Starting camera...";

      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment" }
      });

      video.srcObject = stream;

      // 🔥 WAIT UNTIL VIDEO IS READY
      video.onloadedmetadata = () => {
        video.play();
        scanning = true;
        status.innerText = "Ready to scan";
        requestAnimationFrame(scanFrame);
      };
    }

    function scanFrame() {
      if (!scanning) return;

      if (video.videoWidth === 0 || video.videoHeight === 0) {
        requestAnimationFrame(scanFrame);
        return;
      }

      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");

      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;

      ctx.drawImage(video, 0, 0);

      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = jsQR(imageData.data, canvas.width, canvas.height);

      if (code) {
        handleScan(code.data);
        return;
      }

      requestAnimationFrame(scanFrame);
    }

    async function handleScan(token) {
      scanning = false;
      status.innerText = "Processing...";

      try {
        const res = await fetch(`${API}/scan`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-api-key": "test_merchant_key_123"
          },
          body: JSON.stringify({ token })
        });

        const data = await res.json();

        console.log(data);

        if (data.error === "missing_details") {
          status.innerText = "Missing details - need setup";
        } else if (data.error) {
          status.innerText = data.error;
        } else {
          status.innerText = `Visit: ${data.visit} | Reward: ₱${data.applied_discount}`;
        }

      } catch (err) {
        console.error(err);
        status.innerText = "Scan failed";
      }

      setTimeout(() => {
        status.innerText = "Ready";
        scanning = true;
        requestAnimationFrame(scanFrame);
      }, 3000);
    }
  </script>

</body>
</html>
