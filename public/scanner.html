<!DOCTYPE html>
<html>
<head>
  <title>Tapr Scanner</title>
  <style>
    body {
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #f5f5f5;
    }

    .container {
      text-align: center;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
      width: 320px;
    }

    button {
      padding: 10px;
      width: 100%;
      margin-bottom: 10px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }

    #status {
      margin: 10px 0;
      font-weight: bold;
    }

    #reader {
      width: 100%;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Tapr Scanner</h2>

    <button onclick="startScanner()">Start Scanner</button>

    <p id="status">Idle</p>

    <div id="reader"></div>
  </div>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <script>
    const API = "https://tapr-backend-final-production.up.railway.app";

    function getToken() {
      return localStorage.getItem("token");
    }

    if (!getToken()) {
      window.location.href = "/login.html";
    }

    let scanner = null;

    async function startScanner() {
      const status = document.getElementById("status");

      try {
        status.innerText = "Starting camera...";

        scanner = new Html5Qrcode("reader");

        await scanner.start(
          { facingMode: "environment" },
          {
            fps: 10,
            qrbox: 250
          },
          async (decodedText) => {
            status.innerText = "Processing...";

            const token = getToken();

            try {
              const res = await fetch(`${API}/scan`, {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                  "authorization": token
                },
                body: JSON.stringify({ token: decodedText })
              });

              const data = await res.json();

              if (data.error) {
                status.innerText = data.error;
              } else {
                status.innerText =
                  `Visit: ${data.visit} | Discount: ${data.applied_discount}`;
              }

            } catch {
              status.innerText = "Scan failed";
            }
          }
        );

      } catch (err) {
        console.log(err);
        status.innerText = "Camera error";
      }
    }
  </script>

</body>
</html>
