<!DOCTYPE html>
<html>
<head>
  <title>Join</title>
  <style>
    body {
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #f5f5f5;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 320px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 20px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="box">
  <h2 id="title">Join</h2>

  <input id="phone" placeholder="Phone Number">
  <input id="name" placeholder="Name">
  <input id="email" placeholder="Email">

  <button onclick="join()">Join</button>
</div>

<script>
function getSlug() {
  return window.location.pathname.split("/")[2];
}

const slug = getSlug();

// keep your working title logic
const merchantNames = {
  feralstudios: "Feral Cafe",
  otsostreetcafe: "Otso Street Cafe"
};

if (merchantNames[slug]) {
  document.getElementById("title").innerText =
    "Join " + merchantNames[slug];
}

async function join() {
  const phone = document.getElementById("phone").value;

  if (!phone) {
    alert("Enter phone number");
    return;
  }

  try {
    const res = await fetch(`/wallet/${slug}/${phone}`);
    const data = await res.json();

    if (data.saveJWT) {
      // 🔥 THIS IS THE MISSING STEP
      window.location.href = `https://pay.google.com/gp/v/save/${data.saveJWT}`;
    } else {
      alert("Failed to create wallet");
    }

  } catch (err) {
    alert("Something went wrong");
  }
}
</script>

</body>
</html>
