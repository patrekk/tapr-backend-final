<!DOCTYPE html>
<html>
<head>
  <title>Join</title>
  <style>
body {
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
  background: #E4E4E4;
}

.box {
  background: white;
  padding: 28px;
  border-radius: 16px;
  width: 100%;
  max-width: 380px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

@media (max-width: 480px) {
  body {
    align-items: stretch;
    padding: 0px;
    background: white;
  }

  .box {
    width: 100%;
    max-width: 100%;
    height: 100vh;
    border-radius: 0;
    box-shadow: none;
    padding: 24px 20px;
    justify-content: center;
  }
}

h1 {
  text-align: center;
  margin-bottom: 6px;
  color: #0B0B0B;
}

.sub {
  text-align: center;
  font-size: 14px;
  color: #666;
  margin-bottom: 10px;
}

.benefits {
  font-size: 14px;
  margin: 20px 0 26px;
  padding: 18px;
  background: #f7f7f7;
  border-radius: 14px;
  text-align: center;
}

.benefits div {
  margin-bottom: 10px;
  font-size: 15px;
}

input {
  width: 100%;
  padding: 16px;
  margin-top: 12px;
  border-radius: 12px;
  border: 1px solid #ddd;
  font-size: 16px;
  box-sizing: border-box;
  background: white;
  appearance: none;
}

input[type="date"] {
  min-height: 52px;
}

input:hover {
  border-color: #aaa;
}

input:focus {
  border-color: #2B396D;
  box-shadow: 0 0 0 2px rgba(43,57,109,0.15);
  outline: none;
}

button {
  width: 100%;
  padding: 18x;
  margin-top: 30px;
  background: #0B0B0B;
  color: white;
  border: none;
  border-radius: 16px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
}

@media (max-width: 480px) {
  button {
    padding: 20px;
    font-size: 17px;
    border-radius: 18px;
  }
}

button:hover {
  background: #2B396D;
}

button:active {
  transform: scale(0.97);
}

button:disabled {
  background: #aaa;
  cursor: not-allowed;
}
</style>
</head>
<body>

<div class="box">
  <h1 id="title">Join</h1>

  <p class="sub">Get rewarded every visit</p>

  <div class="benefits">
    <div><strong>₱10 instantly</strong> on your first visit</div>
    <div>Rewards increase every visit</div>
    <div><strong>₱50 reward</strong> on your 5th visit</div>
  </div>

  <input id="phone" placeholder="Phone number">
  <input id="name" placeholder="Full name">
  <input type="date" id="birthday">
  <input id="email" placeholder="Email">

  <button onclick="join()" id="joinBtn">
    Join & Get Rewards
  </button>
</div>

<script>
function getSlug() {
  return window.location.pathname.split("/")[2];
}

const slug = getSlug();

// get merchant names
const API = "https://tapr-backend-final-production.up.railway.app";

fetch(`${API}/merchant/${slug}`)
  .then(res => res.json())
  .then(data => {
    if (data.name) {
      document.getElementById("title").innerText =
        "Join " + data.name;
    }
  })
  .catch(() => {
    document.getElementById("title").innerText = "Join";
  });

async function join() {
  const btn = document.getElementById("joinBtn");
  btn.disabled = true;
  btn.innerText = "Loading...";
  const phone = document.getElementById("phone").value;
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const birthday = document.getElementById("birthday").value;

  if (!phone || !name || !email || !birthday) {
    alert("Fill all fields");
    btn.disabled = false;
    btn.innerText = "Join & Get Rewards";
    return;
  }

  // 🔥 PHONE
  if (!/^09\d{9}$/.test(phone)) {
    alert("Enter a valid PH phone number (09XXXXXXXXX)");
    btn.disabled = false;
    btn.innerText = "Join & Get Rewards";
    return;
  }

  // 🔥 EMAIL
  if (!/^\S+@\S+\.\S+$/.test(email)) {
    alert("Enter a valid email");
    btn.disabled = false;
    btn.innerText = "Join & Get Rewards";
    return;
  }

  // 🔥 NAME
  if (!/^[a-zA-Z\s]+$/.test(name)) {
    alert("Name should only contain letters");
    btn.disabled = false;
    btn.innerText = "Join & Get Rewards";
    return;
  }

  // 🔥 BIRTHDAY CHECK
  if (!birthday) {
    alert("Enter your birthday");
    btn.disabled = false;
    btn.innerText = "Join & Get Rewards";
    return;
  }

  try {
    // 👉 SAVE DATA TEMPORARILY
    localStorage.setItem("joinData", JSON.stringify({
      phone, name, email, birthday
    }));

    // 👉 SEND OTP
    const otpRes = await fetch(`${API}/send-otp`, {
  method: "POST",
  headers: {
    "Content-Type": "application/json"
  },
  body: JSON.stringify({ phone })
});

const otpData = await otpRes.json();

if (otpData.error) {
  alert(otpData.error);
  btn.disabled = false;
  btn.innerText = "Join & Get Rewards";
  return;
}

    // 👉 REDIRECT TO OTP PAGE
    window.location.href = `/otp.html?slug=${slug}`;

  } catch (err) {
    alert("Something went wrong");
    btn.disabled = false;
    btn.innerText = "Join & Get Rewards";
  }
}
</script>

</body>
</html>
