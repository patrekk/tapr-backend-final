<!DOCTYPE html>
<html>
<head>
  <title>Join Tapr</title>
  <style>
    body {
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #f5f5f5;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
      width: 320px;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 13px;
      margin-top: 10px;
      margin-bottom: 4px;
      color: #555;
    }

    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 20px;
      background: black;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
    }

    #status {
      margin-top: 15px;
      text-align: center;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Join Tapr</h2>

    <label>Phone Number</label>
    <input id="phone" type="tel" placeholder="09123456789">

    <label>Name</label>
    <input id="name" type="text" placeholder="Juan Dela Cruz">

    <label>Email</label>
    <input id="email" type="email" placeholder="you@email.com">

    <button onclick="submitForm()">Join</button>

    <p id="status"></p>
  </div>

  <script>
    const API = "https://tapr-backend-final-production.up.railway.app";

    function getSlug() {
      const path = window.location.pathname;

      if (path.startsWith("/join/")) {
        return path.split("/")[2];
      }

      const params = new URLSearchParams(window.location.search);
      return params.get("slug");
    }

    const slug = getSlug();

    async function submitForm() {
      const phone = document.getElementById("phone").value.trim();
      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const status = document.getElementById("status");

      if (!slug) {
        status.innerText = "Invalid link";
        return;
      }

      if (!phone || !name || !email) {
        status.innerText = "Please complete all fields";
        return;
      }

      status.innerText = "Processing...";

      try {
        const walletRes = await fetch(`${API}/wallet/${slug}/${phone}`);
        const walletData = await walletRes.json();

        if (!walletData.saveJWT) {
          status.innerText = "Wallet error";
          return;
        }

        await fetch(`${API}/customer/setup/${slug}`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ phone, name, email })
        });

        status.innerText = "Opening wallet...";

        window.location.href =
          `https://pay.google.com/gp/v/save/${walletData.saveJWT}`;

      } catch {
        status.innerText = "Something went wrong";
      }
    }
  </script>

</body>
</html>
