<!DOCTYPE html>
<html>
<head>
  <title>Scanner</title>
</head>
<body>

  <h2>Tapr Scanner</h2>

  <button onclick="startScanner()">Start Scanner</button>

  <p id="status">Idle</p>

  <div id="camera" style="width:300px;"></div>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <script>
    const API = "https://tapr-backend-final-production.up.railway.app";

    function getToken() {
      return localStorage.getItem("token");
    }

    if (!getToken()) {
      window.location.href = "/login.html";
    }

    let scanner;

    function startScanner() {
      const status = document.getElementById("status");

      scanner = new Html5Qrcode("camera");

      status.innerText = "Starting camera...";

      scanner.start(
        { facingMode: "environment" },
        { fps: 10 },
        async (decodedText) => {
          status.innerText = "Processing...";

          const token = getToken(); // 🔥 ALWAYS GET FRESH TOKEN

          try {
            const res = await fetch(`${API}/scan`, {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "authorization": token
              },
              body: JSON.stringify({ token: decodedText })
            });

            const data = await res.json();

            console.log("SCAN RESPONSE:", data);

            if (data.error) {
              status.innerText = data.error;
            } else {
              status.innerText =
                `Visit: ${data.visit} | Discount: ${data.applied_discount}%`;
            }

          } catch (err) {
            console.log(err);
            status.innerText = "Scan failed";
          }
        }
      );
    }
  </script>

</body>
</html>
