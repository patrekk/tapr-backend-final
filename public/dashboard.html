<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
</head>
<body>

<h2>Dashboard</h2>

<button onclick="generateQR()">Generate QR</button>

<p id="debug"></p>
<p id="link"></p>

<script>
const API = "https://tapr-backend-final-production.up.railway.app";

// 🔥 HARD TOKEN CHECK
function getToken() {
  const token = localStorage.getItem("token");

  console.log("TOKEN FROM STORAGE:", token);

  document.getElementById("debug").innerText =
    "TOKEN: " + (token ? "FOUND" : "MISSING");

  if (!token) {
    alert("No token. Login again.");
    window.location.href = "/login.html";
    throw new Error("NO TOKEN");
  }

  return token;
}

// 🔥 FORCE SAME TOKEN EVERYWHERE
const TOKEN = getToken();

// 🔥 VERIFY SESSION IMMEDIATELY
async function verify() {
  const res = await fetch(`${API}/merchant/me`, {
    headers: { authorization: TOKEN }
  });

  const data = await res.json();

  console.log("ME RESPONSE:", data);

  if (!data.slug) {
    alert("Session broken → token invalid");
    localStorage.clear();
    window.location.href = "/login.html";
    return;
  }

  window.merchantSlug = data.slug;
}

function generateQR() {
  if (!window.merchantSlug) {
    alert("Merchant not loaded");
    return;
  }

  const url = `${window.location.origin}/join/${window.merchantSlug}`;
  document.getElementById("link").innerText = url;
}

// 🔥 INIT
verify();
</script>

</body>
</html>
