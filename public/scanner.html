<!DOCTYPE html>
<html>
<head>
  <title>Tapr Scanner</title>
</head>
<body>
  <h2>Tapr Scanner</h2>
  <video id="video" width="300" autoplay></video>
  <p id="status">Idle</p>

  <script src="https://cdn.jsdelivr.net/npm/jsqr"></script>

  <script>
    const API = "https://tapr-backend-final-production.up.railway.app";

    const video = document.getElementById("video");
    const status = document.getElementById("status");

    async function startCamera() {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
      video.srcObject = stream;
    }

    async function scanFrame() {
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");

      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;

      ctx.drawImage(video, 0, 0);

      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = jsQR(imageData.data, canvas.width, canvas.height);

      if (code) {
        handleScan(code.data);
      }

      requestAnimationFrame(scanFrame);
    }

    let scanning = true;

    async function handleScan(token) {
      if (!scanning) return;
      scanning = false;

      status.innerText = "Processing...";

      try {
        const res = await fetch(`${API}/scan`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-api-key": "test_merchant_key_123"
          },
          body: JSON.stringify({ token })
        });

        const data = await res.json();

        console.log("SCAN RESULT:", data);

        if (data.error === "missing_details") {
          status.innerText = "Missing details";
        } else if (data.error) {
          status.innerText = data.error;
        } else {
          status.innerText = `Visit: ${data.visit} | Reward: ₱${data.applied_discount}`;
        }

      } catch (err) {
        console.error(err);
        status.innerText = "Scan failed";
      }

      setTimeout(() => {
        scanning = true;
        status.innerText = "Ready";
      }, 3000);
    }

    startCamera().then(scanFrame);
  </script>
</body>
</html>
