<!DOCTYPE html>
<html>
<head>
  <title>Tapr Scanner</title>
  <style>
    body {
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #f5f5f5;
    }

    .container {
      text-align: center;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
      width: 320px;
    }

    button {
      padding: 10px;
      width: 100%;
      margin-bottom: 10px;
      background: black;
      color: white;
      border: none;
    }

    #status {
      margin: 10px 0;
      font-weight: bold;
    }

    #reader {
      width: 100%;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Tapr Scanner</h2>
    <p id="merchantName">Loading...</p>

    <button onclick="startScanner()">Start Scanner</button>

    <p id="status">Idle</p>

    <div id="reader"></div>
  </div>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <script>
    const API = "https://tapr-backend-final-production.up.railway.app";
    let scannerInstance = null;
    function getToken() {
      return localStorage.getItem("token");
    }

    async function loadMerchant() {
      const res = await fetch(`${API}/merchant/me`, {
        headers: {
          "authorization": getToken()
        }
      });

      const data = await res.json();
      console.log("SCAN RESPONSE:", data);
      document.getElementById("merchantName").innerText =
        data.name || "Error loading";
    }

    loadMerchant();

    async function startScanner() {
      let isScanning = true;
      const status = document.getElementById("status");

      if (scannerInstance !== null) return;

      scannerInstance = new Html5Qrcode("reader");

      try {

  await scannerInstance.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    async (decodedText) => {

        if (!isScanning) return;

          isScanning = false;
          status.innerText = "Processing...";

          let data;

try {
  const res = await fetch(`${API}/scan`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "authorization": getToken()
    },
    body: JSON.stringify({ token: decodedText })
  });

  data = await res.json();

} catch (err) {
  status.innerText = "❌ Network error. Try again.";
  try { await scannerInstance.stop(); } catch(e) {}
  scannerInstance = null;
  return;
}

  if (data.error === "No session" || data.error === "Invalid session") {
  try {
    await scannerInstance.stop();
  } catch (e) {}
  scannerInstance = null;
  window.location.href = "/login";
  return;
}

  if (data.error) {
    status.innerText = `❌ ${data.error}`;
  } else {
    status.innerText = `✅ ₱${data.applied_discount} DISCOUNT

Visit ${data.visit}/5
Next: ₱${data.next_reward}`;
  }

try {
  await scannerInstance.stop();
} catch (e) {}
scannerInstance = null;
        } // closes callback
      ); // closes start()

      status.innerText = "Camera ready";

      } catch (err) {
  status.innerText = "❌ Camera error. Allow camera access.";
  scannerInstance = null;
}
    }
  

    
  </script>

</body>
</html>
