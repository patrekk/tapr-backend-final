<!DOCTYPE html>
<html>
<head>
  <title>Join Tapr</title>
</head>
<body>

  <h2>Join Tapr</h2>

  <input id="phone" placeholder="Phone Number"><br><br>
  <input id="name" placeholder="Name"><br><br>
  <input id="email" placeholder="Email"><br><br>

  <button onclick="submitForm()">Join</button>

  <pre id="status"></pre>

  <script>
    const API = "https://tapr-backend-final-production.up.railway.app";

    const params = new URLSearchParams(window.location.search);
    const slug = params.get("slug");

    async function submitForm() {
      const phone = document.getElementById("phone").value.trim();
      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();

      const status = document.getElementById("status");

      status.innerText = "START\n";
      status.innerText += "SLUG: " + slug + "\n\n";

      try {
        // 🔥 WALLET
        const walletRes = await fetch(`${API}/wallet/${slug}/${phone}`);
        const walletData = await walletRes.json();

        status.innerText += "WALLET RESPONSE:\n";
        status.innerText += JSON.stringify(walletData, null, 2) + "\n\n";

        if (!walletData.saveJWT) {
          status.innerText += "STOP: NO JWT\n";
          return;
        }

        // 🔥 SETUP
        const setupRes = await fetch(`${API}/customer/setup/${slug}`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ phone, name, email })
        });

        const setupData = await setupRes.json();

        status.innerText += "SETUP RESPONSE:\n";
        status.innerText += JSON.stringify(setupData, null, 2) + "\n\n";

        status.innerText += "SUCCESS → REDIRECTING\n";

        window.location.href =
          `https://pay.google.com/gp/v/save/${walletData.saveJWT}`;

      } catch (err) {
        status.innerText += "ERROR:\n" + err.message;
      }
    }
  </script>

</body>
</html>
