<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <title>Verify</title>
  <style>

:root {
  --primary: #2B396D;
  --bg: #E4E4E4;
  --text: #0B0B0B;
  --muted: #666;
}

body {
  font-family: 'Inter', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
  background: var(--bg);
}

.box {
  background: white;
  padding: 32px;
  border-radius: 16px;
  width: 100%;
  max-width: 380px;
  box-shadow: 0 10px 30px rgba(43,57,109,0.12);
  text-align: center;
}

@media (max-width: 480px) {
  body {
    align-items: stretch;
    background: white;
  }

  .box {
    max-width: 100%;
    height: 100vh;
    border-radius: 0;
    box-shadow: none;
    padding: 24px 20px;
  }
}

h1 {
  margin-bottom: 6px;
  color: var(--text);
}

.sub {
  font-size: 14px;
  color: var(--muted);
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 18px;
  margin-top: 12px;
  border-radius: 14px;
  border: 1px solid #ddd;
  font-size: 22px;
  text-align: center;
  letter-spacing: 8px;
  box-sizing: border-box;
}

input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 2px var(--primary);
  outline: none;
}

button {
  width: 100%;
  padding: 18px;
  margin-top: 20px;
  background: var(--primary);
  color: white;
  border: none;
  border-radius: 16px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
}

button.secondary {
  background: #ddd;
  color: #333;
}

button:disabled {
  background: #aaa;
}

.phone {
  font-size: 13px;
  color: #888;
  margin-bottom: 10px;
}

.tapr {
  text-align: center;
  font-size: 11px;
  color: #999;
  margin-top: 14px;
  opacity: 0.6;
}
</style>
</head>
<body>

<div class="box">
  <h1>Verify your number</h1>

  <p class="phone" id="phoneText"></p>

  <p class="sub">Enter the 6-digit code</p>

  <input id="otp" maxlength="6" inputmode="numeric">

  <button onclick="verify()" id="verifyBtn">
    Verify Code
  </button>

  <button onclick="resend()" class="secondary">
    Resend Code
  </button>
  <p class="tapr">Powered by Tapr</p>
</div>

<script>
const API = "https://tapr-backend-final-production.up.railway.app";
const slug = getSlug();

fetch(`${API}/merchant/${slug}`)
  .then(res => res.json())
  .then(data => {
    if (data.hex_color) {
      document.documentElement.style
        .setProperty('--primary', data.hex_color);
    }
  });

function getSlug() {
  return new URLSearchParams(window.location.search).get("slug");
}

// 🔥 SHOW PHONE NUMBER
const joinData = JSON.parse(localStorage.getItem("joinData"));

document.getElementById("otp").addEventListener("input", function() {
  if (this.value.length === 6) {
    verify();
  }
});

if (joinData?.phone) {
  document.getElementById("phoneText").innerText =
    "Code sent to " + joinData.phone;
}

// 🔥 VERIFY OTP
async function verify() {
  const otp = document.getElementById("otp").value;
  const btn = document.getElementById("verifyBtn");

  if (!otp || otp.length !== 6) {
    alert("Enter 6-digit code");
    return;
  }

  if (!joinData) {
    alert("Session expired. Go back.");
    return;
  }

  btn.innerText = "Verifying...";
  btn.disabled = true;

  try {
    const res = await fetch(`${API}/wallet/${getSlug()}`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        ...joinData,
        otp
      })
    });

    const result = await res.json();

    if (result.saveJWT) {

  if (result.existing) {
    alert("Welcome back! Opening your pass...");
  }

  localStorage.removeItem("joinData");

  window.location.href =
    `https://pay.google.com/gp/v/save/${result.saveJWT}`;
    } else {
      alert(result.error || "Invalid OTP");
      btn.innerText = "Verify";
      btn.disabled = false;
    }

  } catch (err) {
    alert("Something went wrong");
    btn.innerText = "Verify";
    btn.disabled = false;
  }
}

// 🔥 RESEND OTP
async function resend() {
  if (!joinData?.phone) return;

  const res = await fetch(`${API}/send-otp`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ phone: joinData.phone })
  });

  const data = await res.json();

  if (data.error) {
    alert(data.error);
    return;
  }

  alert("Code sent");
}

document.getElementById("otp").focus();
</script>

</body>
</html>
