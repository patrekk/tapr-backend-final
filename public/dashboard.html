<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
</head>
<body>

<h2>Dashboard</h2>

<p id="status">Initializing...</p>
<p id="link"></p>

<button onclick="generateQR()">Generate QR</button>

<script>
const API = "https://tapr-backend-final-production.up.railway.app";

function getToken() {
  return localStorage.getItem("token");
}

// 🔥 HARD BLOCK UNTIL TOKEN IS VALID
async function waitForValidSession() {
  let attempts = 0;

  while (attempts < 5) {
    const token = getToken();

    console.log("Checking token:", token);

    if (!token) {
      await new Promise(r => setTimeout(r, 500));
      attempts++;
      continue;
    }

    const res = await fetch(`${API}/merchant/me`, {
      headers: { authorization: token }
    });

    const data = await res.json();

    console.log("Session check:", data);

    if (data.slug) {
      return data;
    }

    // wait then retry
    await new Promise(r => setTimeout(r, 500));
    attempts++;
  }

  // 🔥 FAIL HARD
  alert("Session failed. Please login again.");
  localStorage.clear();
  window.location.href = "/login.html";
}

// 🔥 INIT (BLOCKING)
async function init() {
  const merchant = await waitForValidSession();

  document.getElementById("status").innerText =
    "Logged in as: " + merchant.name;

  window.merchantSlug = merchant.slug;
}

// 🔥 QR
function generateQR() {
  if (!window.merchantSlug) {
    alert("Merchant not ready");
    return;
  }

  const url = `${window.location.origin}/join/${window.merchantSlug}`;
  document.getElementById("link").innerText = url;
}

init();
</script>

</body>
</html>
