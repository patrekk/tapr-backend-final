<!DOCTYPE html>
<html>
<head>
  <title>Join</title>
  <style>
    body {
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #f5f5f5;
    }

    .box {
      background: white;
      padding: 25px;
      border-radius: 10px;
      width: 320px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      background: black;
      color: white;
      border: none;
    }
  </style>
</head>
<body>

<div class="box">
  <h2 id="title">Join</h2>

  <input id="phone" placeholder="Phone">
  <input id="name" placeholder="Name">
  <input id="email" placeholder="Email">

  <button onclick="join()">Join</button>
</div>

<script>
const API = "https://tapr-backend-final-production.up.railway.app";

function getSlug() {
  return window.location.pathname.split("/")[2];
}

const slug = getSlug();

// 🔥 FIX TITLE
async function loadMerchant() {
  const res = await fetch(`${API}/merchant/${slug}`);
  const data = await res.json();

  if (data.name) {
    document.getElementById("title").innerText = "Join " + data.name;
  }
}

loadMerchant();

function join() {
  const phone = document.getElementById("phone").value;
  window.location.href = `${API}/wallet/${slug}/${phone}`;
}
</script>

</body>
</html>
