<!DOCTYPE html>
<html>
<head>
  <title>Tapr Scanner</title>
  <style>
    body {
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #f5f5f5;
    }

    .container {
      text-align: center;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
      width: 320px;
    }

    button {
      padding: 10px;
      width: 100%;
      margin-bottom: 10px;
      background: black;
      color: white;
      border: none;
    }

    #status {
      margin: 10px 0;
      font-weight: bold;
    }

    #reader {
      width: 100%;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Tapr Scanner</h2>
    <p id="merchantName">Loading...</p>

    <button onclick="startScanner()">Start Scanner</button>

    <p id="status">Idle</p>

    <div id="reader"></div>
  </div>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <script>
    const API = "https://tapr-backend-final-production.up.railway.app";

    function getToken() {
      return localStorage.getItem("token");
    }

    async function loadMerchant() {
      const res = await fetch(`${API}/merchant/me`, {
        headers: {
          "authorization": getToken()
        }
      });

      const data = await res.json();
      document.getElementById("merchantName").innerText =
        data.name || "Error loading";
    }

    loadMerchant();

    async function startScanner() {
      const status = document.getElementById("status");

      const scanner = new Html5Qrcode("reader");

      await scanner.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: 250 },
        async (decodedText) => {
          status.innerText = "Processing...";

          const res = await fetch(`${API}/scan`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "authorization": getToken()
            },
            body: JSON.stringify({ token: decodedText })
          });

          const data = await res.json();

          function getRewardText(visit, pending) {
  if (visit === 0) {
    return "₱10 ready on your first visit";
  }

  if (pending === 0) {
    return "2 more visits → ₱50";
  }

  if (visit === 4) {
    return "Next visit → ₱50";
  }

  return `Next visit → ₱${pending}`;
}

if (data.error) {
  status.innerText = data.error;

} else if (data.message) {
  status.innerText = `${data.message}

Visit ${data.visit}/5
Applied: ₱${data.applied_discount}
${getRewardText(data.visit, data.next_reward)}`;

} else {
  status.innerText = `Visit ${data.visit}/5
Applied: ₱${data.applied_discount}
${getRewardText(data.visit, data.next_reward)}`;
}
        }
      );

      status.innerText = "Camera ready";
    }
  </script>

</body>
</html>
