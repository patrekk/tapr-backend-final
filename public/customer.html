<!DOCTYPE html>
<html>
<head>
  <title>Tapr Customer</title>

  <style>
    body {
      text-align: center;
      font-family: Arial;
    }

    #info {
      margin-top: 20px;
      font-size: 18px;
    }
  </style>
</head>
<body>

  <h2>Your Tapr QR</h2>

  <div id="setup">
    <input id="phoneInput" placeholder="Enter phone number" />
    <button onclick="savePhone()">Save</button>
  </div>

  <div id="main" style="display:none;">
    <img id="qr" width="250" />

    <div id="info">
      <div id="visit"></div>
      <div id="earned"></div>
      <div id="next"></div>
    </div>
  </div>

  <script>
    let phone = localStorage.getItem("tapr_phone");

    function savePhone() {
      const input = document.getElementById("phoneInput").value;

      if (!input) return alert("Enter phone");

      localStorage.setItem("tapr_phone", input);
      location.reload();
    }

    function getNextReward(visit) {
      switch (visit) {
        case 1:
        case 2:
          return "₱10";
        case 3:
          return "₱20";
        case 4:
          return "₱50 next visit";
        case 5:
          return "Reward ready";
      }
    }

    async function loadQR() {
      const res = await fetch(`/qr/${phone}`);
      const data = await res.json();
      document.getElementById('qr').src = data.qr;
    }

    async function loadCustomer() {
      const res = await fetch(`/customer/${phone}`);
      const data = await res.json();

      document.getElementById('visit').innerText =
        `Visit #: ${data.visit_count}`;

      document.getElementById('earned').innerText =
        `Reward ready: ₱${data.pending_discount}`;

      document.getElementById('next').innerText =
        `Next: ${getNextReward(data.visit_count)}`;
    }

    if (!phone) {
      document.getElementById("setup").style.display = "block";
    } else {
      document.getElementById("setup").style.display = "none";
      document.getElementById("main").style.display = "block";

      loadQR();
      loadCustomer();

      setInterval(loadQR, 30000);
      setInterval(loadCustomer, 3000); // 🔥 faster refresh
    }
  </script>

</body>
</html>
